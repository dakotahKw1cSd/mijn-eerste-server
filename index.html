<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
            rel="stylesheet" 
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
            crossorigin="anonymous">
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
                integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
                crossorigin="anonymous">
            </script>
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00695C">
    <title>mijn health app</title>
</head>
<body>
<div class="app-header">
    <h2>Health Tracker</h2>
    <small>Friday, May 8, 2026</small>
</div>
<div class="container py-3">

    <div class="card p-3 mb-3">

        <h5 id="activiteit-titel">Nieuwe activiteit</h5>

        <form id="activiteit-form">

            <input
                type="text"
                id="activiteit-input"
                class="form-control mb-2"
                placeholder="Wat ga je doen?"
                id="activiteit-input"
                required>

            <button
                type="submit"
                id="toevoegen-knop"
                class="btn btn-success w-100">
                Toevoegen
            </button>

        </form>
    <div class="taal">
        <button
            id="taal-knop"
            class="btn btn-outline-light m-3">
            English
        </button>
    </div>
    </div>
<div class="container py-3">

    <div class="row g-3">

        <div class="col-6">
            <div class="card health-card">
                <h6><i class="bi bi-droplet-fill text-primary"></i> Water</h6>
                <h3 id="water-ratio">6/8</h3>
                <div class="progress-bar bg-primary" id="water-bar"></div>
                <small>glasses</small>

                <div class="progress mt-2">
                    <div class="progress-bar bg-primary" style="width:75%"></div>
                </div>
            </div>
        </div>

        <div class="col-6">
            <div class="card health-card">
                <h6><i class="bi bi-activity text-success"></i> Steps</h6>
                <h3>7,842</h3>
                <small>10,000</small>

                <div class="progress mt-2">
                    <div class="progress-bar bg-success" style="width:78%"></div>
                </div>
            </div>
        </div>

        <div class="col-6">
            <div class="card health-card">
                <h6><i class="bi bi-moon-stars-fill text-purple"></i> Sleep</h6>
                <h3>7.5h</h3>
                <small>last night</small>

                <div class="progress mt-2">
                    <div class="progress-bar bg-info" style="width:90%"></div>
                </div>
            </div>
        </div>

        <div class="col-6">
            <div class="card health-card">
                <h6><i class="bi bi-person-fill text-warning"></i> Weight</h6>
                <h3>68.5kg</h3>
                <small>-0.3kg</small>

                <div class="progress mt-2">
                    <div class="progress-bar bg-warning" style="width:85%"></div>
                </div>
            </div>
        </div>

    </div>

    <div class="card mt-3 p-3">

        <h5>Quick Actions</h5>

        <div class="row mt-2">
            <div class="col-6">
                <button class="btn btn-primary w-100">
                    Add Water
                </button>
            </div>

            <div class="col-6">
                <button class="btn btn-success w-100">
                    Add Steps
                </button>
            </div>
        </div>

    </div>

    <div class="card mt-3 p-3">

        <h5>Weekly Progress</h5>

            <h6 class="mt-2">Weekly Activity Progress (%)</h6>
            <p class="text-muted small">Hoe actief je was per dag (0–100%)</p>
                <div class="legend mt-2">
                    <span><span class="dot blue"></span> Activiteit score</span>
                </div>
        <div class="chart">
            <div class="bar" data-value="70" data-day="Mon" data-label="7,000 steps"></div>
            <div class="bar" data-value="80" data-day="Tue" data-label="8,200 steps"></div>
            <div class="bar" data-value="60" data-day="Wed" data-label="6,100 steps"></div>
            <div class="bar" data-value="90" data-day="Thu" data-label="9,500 steps"></div>
            <div class="bar" data-value="65" data-day="Fri" data-label="6,700 steps"></div>
            <div class="bar" data-value="50" data-day="Sat" data-label="5,000 steps"></div>
            <div class="bar" data-value="75" data-day="Sun" data-label="7,800 steps"></div>
        </div>

    </div>

    <div class="card mt-3 p-3">

        <h5 id="recent-titel">Recente Activiteiten</h5>

<ul
    class="list-group list-group-flush"
    id="activiteiten-lijst">
</ul>

    </div>

</div>

<footer class="bottom-nav">

    <a href="index.html" class="active">
    <i class="bi bi-house-fill"></i><br>
    <span id="home-link">Home</span>
</a>

    <a href="pages/stats.html">
    <i class="bi bi-bar-chart-fill"></i><br>
    <span id="stats-link">Stats</span>
</a>

    <a href="pages/profile.html">
    <i class="bi bi-person-fill"></i><br>
    <span id="profile-link">Profile</span>
</a>

</footer>
    <script src="scripts/app.js"></script>
</body>
</html>
