<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
            rel="stylesheet" 
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
            crossorigin="anonymous">
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
                integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
                crossorigin="anonymous">
            </script>
            <link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../mijn eerste server/styles/styles.css">
    <link rel="manifest" href="../mijn eerste server/manifest.json">
    <meta name="theme-color" content="#00695C">
    <title>mijn health app</title>
</head>
<body>
<div class="app-header">
    <h2>Health Tracker</h2>
    <small>Friday, May 8, 2026</small>
</div>
<div class="container py-3">

    <div class="card p-3 mb-3">

        <h5 id="activiteit-titel">Nieuwe activiteit</h5>

        <form id="activiteit-form">

            <input
                type="text"
                id="activiteit-input"
                class="form-control mb-2"
                placeholder="Wat ga je doen?"
id="activiteit-input"
                required>

            <button
    type="submit"
    id="toevoegen-knop"
    class="btn btn-success w-100">
    Toevoegen
</button>

        </form>
<div class="taal">
    <button
    id="taal-knop"
    class="btn btn-outline-light m-3">
    English
</button>
</div>
    </div>
<div class="container py-3">

    <div class="row g-3">

        <div class="col-6">
            <div class="card health-card">
                <h6><i class="bi bi-droplet-fill text-primary"></i> Water</h6>
                <h3>6/8</h3>
                <small>glasses</small>

                <div class="progress mt-2">
                    <div class="progress-bar bg-primary" style="width:75%"></div>
                </div>
            </div>
        </div>

        <div class="col-6">
            <div class="card health-card">
                <h6><i class="bi bi-activity text-success"></i> Steps</h6>
                <h3>7,842</h3>
                <small>/10,000</small>

                <div class="progress mt-2">
                    <div class="progress-bar bg-success" style="width:78%"></div>
                </div>
            </div>
        </div>

        <div class="col-6">
            <div class="card health-card">
                <h6><i class="bi bi-moon-stars-fill text-purple"></i> Sleep</h6>
                <h3>7.5h</h3>
                <small>last night</small>

                <div class="progress mt-2">
                    <div class="progress-bar bg-info" style="width:90%"></div>
                </div>
            </div>
        </div>

        <div class="col-6">
            <div class="card health-card">
                <h6><i class="bi bi-person-fill text-warning"></i> Weight</h6>
                <h3>68.5kg</h3>
                <small>-0.3kg</small>

                <div class="progress mt-2">
                    <div class="progress-bar bg-warning" style="width:85%"></div>
                </div>
            </div>
        </div>

    </div>

    <div class="card mt-3 p-3">

        <h5>Quick Actions</h5>

        <div class="row mt-2">
            <div class="col-6">
                <button class="btn btn-primary w-100">
                    Add Water
                </button>
            </div>

            <div class="col-6">
                <button class="btn btn-success w-100">
                    Add Steps
                </button>
            </div>
        </div>

    </div>

    <div class="card mt-3 p-3">

        <h5>Weekly Progress</h5>

        <div class="chart">
            <div style="height:70%"></div>
            <div style="height:80%"></div>
            <div style="height:60%"></div>
            <div style="height:90%"></div>
            <div style="height:65%"></div>
            <div style="height:50%"></div>
            <div style="height:75%"></div>
        </div>

    </div>

    <div class="card mt-3 p-3">

        <h5 id="recent-titel">Recente Activiteiten</h5>

<ul
    class="list-group list-group-flush"
    id="activiteiten-lijst">
</ul>

    </div>

</div>

<footer class="bottom-nav">

    <a href="../mijn eerste server/index.html" class="active">
    <i class="bi bi-house-fill"></i><br>
    <span id="home-link">Home</span>
</a>

    <a href="../mijn eerste server/pages/stats.html">
    <i class="bi bi-bar-chart-fill"></i><br>
    <span id="stats-link">Stats</span>
</a>

    <a href="../mijn eerste server/pages/profile.html">
    <i class="bi bi-person-fill"></i><br>
    <span id="profile-link">Profile</span>
</a>

</footer>
<script src="../mijn eerste server/scripts/app.js"></script>
</body>
</html>
