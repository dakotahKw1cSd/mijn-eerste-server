<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles/styles.css">

    <title>Health Tracker</title>
</head>

<body>

<div class="app-header">
    <h2 id="app-title">Health Tracker</h2>
    <small id="app-date"></small>
</div>

<div class="container py-3">

    <!-- FORM -->
    <div class="card p-3 mb-3">

        <h5 id="activiteit-titel">Nieuwe activiteit</h5>

        <form id="activiteit-form">
            <input
                type="text"
                id="activiteit-input"
                class="form-control mb-2"
                placeholder="Wat ga je doen?"
                required>

            <button id="toevoegen-knop" class="btn btn-success w-100">
                Toevoegen
            </button>
        </form>

        <div class="taal">
            <button id="taal-knop" class="btn btn-outline-light m-3">
                English
            </button>
        </div>

    </div>

    <!-- CARDS -->
    <div class="row g-3">

        <div class="col-6">
            <div class="card health-card">
                <h6><i class="bi bi-droplet-fill text-primary"></i> <span id="water-title">Water</span></h6>
                <h3>6/8</h3>
                <small id="water-unit">glasses</small>
            </div>
        </div>

        <div class="col-6">
            <div class="card health-card">
                <h6><i class="bi bi-activity text-success"></i> <span id="steps-title">Steps</span></h6>
                <h3>7842</h3>
                <small>10000</small>
            </div>
        </div>

        <div class="col-6">
            <div class="card health-card">
                <h6><i class="bi bi-moon-stars-fill text-purple"></i> <span id="sleep-title">Sleep</span></h6>
                <h3>7.5h</h3>
                <small id="sleep-sub">last night</small>
            </div>
        </div>

        <div class="col-6">
            <div class="card health-card">
                <h6><i class="bi bi-person-fill text-warning"></i> <span id="weight-title">Weight</span></h6>
                <h3>68.5kg</h3>
                <small>-0.3kg</small>
            </div>
        </div>

    </div>

    <!-- QUICK ACTIONS -->
    <div class="card mt-3 p-3">

        <h5 id="quick-title">Quick Actions</h5>

        <div class="row mt-2">
            <div class="col-6">
                <button id="water-btn" class="btn btn-primary w-100">
                    Add Water
                </button>
            </div>

            <div class="col-6">
                <button id="steps-btn" class="btn btn-success w-100">
                    Add Steps
                </button>
            </div>
        </div>

    </div>

    <!-- WEEKLY CHART -->
    <div class="card mt-3 p-3">

        <h5 id="weekly-title">Weekly Progress for steps</h5>

        <p id="weekly-sub" class="text-muted small">
            Your activity per day (0–100%)
        </p>

        <div class="chart">
            <div class="bar" data-value="70" data-day="Mon" data-label="7,000 steps"></div>
            <div class="bar" data-value="80" data-day="Tue" data-label="8,200 steps"></div>
            <div class="bar" data-value="60" data-day="Wed" data-label="6,100 steps"></div>
            <div class="bar" data-value="90" data-day="Thu" data-label="9,500 steps"></div>
            <div class="bar" data-value="65" data-day="Fri" data-label="6,700 steps"></div>
            <div class="bar" data-value="50" data-day="Sat" data-label="5,000 steps"></div>
            <div class="bar" data-value="75" data-day="Sun" data-label="7,800 steps"></div>
        </div>

    </div>

    <!-- RECENT -->
    <div class="card mt-3 p-3">

        <h5 id="recent-titel">Recente Activiteiten</h5>
        <ul class="list-group list-group-flush" id="activiteiten-lijst"></ul>

    </div>

</div>

<footer class="bottom-nav">

    <a href="index.html" class="active">
        <i class="bi bi-house-fill"></i><br>
        <span id="home-link">Home</span>
    </a>

    <a href="pages/stats.html">
        <i class="bi bi-bar-chart-fill"></i><br>
        <span id="stats-link">Stats</span>
    </a>

    <a href="pages/profile.html">
        <i class="bi bi-person-fill"></i><br>
        <span id="profile-link">Profile</span>
    </a>

</footer>

<script src="scripts/app.js"></script>
</body>
</html>
